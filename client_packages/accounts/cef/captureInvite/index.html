<script>
var timeLeft = 10;

function countdown() {
    timeLeft--;
    document.getElementById("timer").innerHTML = timeLeft + " сек";
    if (timeLeft <= 0) {
        clearInterval(interval);

    }
}

var interval = setInterval(countdown, 1000);
