<!DOCTYPE html>
<html>
    <head>
		<meta charset="UTF-8">
        <link rel="stylesheet" href="./styles/main.css">
    </head>
    <body>
		<div class="main">
			<div class="wrapper">
				<div class="not-block">
					<div class="notif">
						<div class="loading yellow" style="width: 60%;"></div>
						<div class="info-icon icon"></div>
						<div class="notification">
							<div class="not-title">Уведомление</div>
							<div class="not-text">Обрабатываем данные...</div>	
						</div>
					</div>
						
					<div class="notif">
						<div class="loading red" style="width: 50%;"></div>
						<div class="no-icon icon"></div>
						<div class="notification">
							<div class="not-title">Уведомление!</div>
							<div class="not-text">Успешно!</div>	
						</div>
					</div>
					<div class="notif">
						<div class="loading green" style="width: 65%;"></div>
						<div class="good-icon icon"></div>
						<div class="notification">
							<div class="not-title">Уведомление!</div>
							<div class="not-text">Ошибка!</div>	
						</div>
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
