<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Family System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <img src="./img/close.svg" alt="" onclick="mp.trigger('closeCreate')">
    <div class="block_tittle">
        <h1>СОЗДАНИЕ<br>
            <font color="AD00FF">СЕМЬИ</font>
        </h1>
        <h2>Создавайте свою семью, объединяйтесь и играйте вместе со своими друзьями!</h2>
    </div>
    <div class="confirm_dialog">
        <div class="confirm_block">
            <h1 id="confirm_txt">Вы уверены, что хотите создать семью за</h1>
            <button id="confirm_yes">Да</button>
            <button id="confirm_no" onclick="confirmDialog()">Отмена</button>
        </div>
    </div>
    <div class="buy_block">
        <input id="nameFam" type="text" placeholder="Введите название семьи"><br>
        <div class="block_buy_buttons">
            <button class="buy_money" onclick="buyFamily(0)">Создать за 2 000 000 $</button>
            <button class="buy_dp" onclick="buyFamily(1)">Создать за 1500 CC</button>
        </div>
    </div>
    <script src="./index.js"></script>
</body>

</html>
