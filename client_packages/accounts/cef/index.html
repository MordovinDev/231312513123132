<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic DM</title>
  <style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#121212}
.c{background:#1a1a1a;padding:35px;border-radius:16px;border:1px solid #ff8c0030;width:100%;max-width:360px;text-align:center}
.logo{width:60px;height:60px;margin:0 auto 12px;background:linear-gradient(135deg,#ff8c00,#e65c00);border-radius:50%;display:flex;align-items:center;justify-content:center}
.logo svg{width:26px;height:26px;fill:#fff}
.t{font-size:28px;font-weight:700;margin-bottom:6px}
.o{color:#ff8c00}
.w{color:#fff}
.c>span{color:#666;font-size:13px}
.error{color:#f44;font-size:12px;min-height:16px;margin:8px 0}
form{display:flex;flex-direction:column;gap:12px;margin-top:10px}
.i{position:relative}
.i svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;fill:#ff8c00}
.inputText{width:100%;padding:12px 12px 12px 40px;background:#222;border:1px solid #333;border-radius:8px;color:#fff;font-size:14px;transition:.2s}
.inputText:focus{outline:none;border-color:#ff8c00;background:#1f1710}
.inputText::placeholder{color:#555}
input[type="button"]{width:100%;padding:12px;background:linear-gradient(135deg,#ff8c00,#e65c00);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
input[type="button"]:hover{opacity:.9;transform:translateY(-1px)}
.r{margin-top:6px}
.s{color:#ff8c00;font-size:12px;cursor:pointer}
.s:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="c">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M7.97 16L5 19c-.33.3-.77.5-1.25.5A1.75 1.75 0 0 1 2 17.75V17.5L3 16H2a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h7.2L10.5 6H14l-1.3 2H22a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-1l1 1.5v.25a1.75 1.75 0 0 1-1.75 1.75c-.48 0-.92-.2-1.25-.5L16.03 16H7.97zM6 12a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm4-2a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm4 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm4 2a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/></svg></div>
    <div class="t"><span class="o">Dynamic</span> <span class="w">DM</span></div>
    <span>С возвращением!</span>
    <div class="error"></div>
    <form id="loginMenu">
      <div class="i">
        <input class="inputText" type="text" name="login" placeholder="Логин">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </div>
      <div class="i">
        <input class="inputText" type="password" name="password" placeholder="Пароль">
        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
      </div>
      <input type="button" value="Войти">
      <div class="r"><span class="s" onclick="changeType('register')">Создать аккаунт</span></div>
    </form>
    <form id="registerMenu" style="display:none">
      <div class="i">
        <input class="inputText" type="text" name="login" placeholder="Логин">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </div>
      <div class="i">
        <input class="inputText" type="password" name="password" placeholder="Пароль">
        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
      </div>
      <div class="i">
        <input class="inputText" type="password" name="repeatPassword" placeholder="Повторите пароль">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
      </div>
      <input type="button" value="Регистрация">
      <div class="r"><span class="s" onclick="changeType('login')">Войти в аккаунт</span></div>
    </form>
  </div>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="index.js"></script>
</body>
</html>
